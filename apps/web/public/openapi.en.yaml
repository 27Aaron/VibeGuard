openapi: 3.1.0
info:
  title: VibeGuard Public API
  version: 1.1.0
  description: |
    VibeGuard provides a public supply-chain threat intelligence API for developers, security teams, and agent tools.
    The API covers security article search, source statistics, package vulnerability checks, structured advisories, CVE enrichment, and sync status.
    Public endpoints require no authentication; Admin and MCP transport endpoints are intentionally outside this document.
  contact:
    name: VibeGuard
    url: https://github.com/27Aaron/VibeGuard

externalDocs:
  description: VibeGuard API page
  url: /en/api

servers:
  - url: /
    description: Current site root. Relative paths work across reverse proxies and multiple deployment domains.

tags:
  - name: Public
    description: Overview and source endpoints for the public reading stream.
  - name: Articles
    description: Security article list and detail endpoints. Only ready articles are returned.
  - name: Security
    description: Local security mirror queries for package coordinates, advisories, CVEs, and sync status.

# Public content endpoints for web pages, RSS/MCP tools, and lightweight clients.
paths:
  /api/overview:
    get:
      operationId: getPublicOverview
      summary: Public site overview
      description: Returns article and source counts for the public reading stream. Useful for homepages, health checks, and monitoring panels.
      tags: [Public]
      responses:
        "200":
          description: Article and source count overview.
          content:
            application/json:
              schema:
                type: object
                required: [meta, overview]
                properties:
                  meta:
                    $ref: "#/components/schemas/PublicMeta"
                  overview:
                    $ref: "#/components/schemas/PublicOverview"
              examples:
                currentSite:
                  summary: Current site overview
                  value:
                    meta:
                      generatedAt: "2026-05-24T12:24:04+08:00"
                      generatedAtDisplay: "2026-05-24 12:24"
                    overview:
                      articleCount: 101
                      sourceCount: 1
      x-codeSamples:
        - lang: cURL
          label: Get site overview
          source: |
            curl -sS 'http://127.0.0.1:3000/api/overview'

  /api/sources:
    get:
      operationId: listPublicSources
      summary: Public source list
      description: Returns each public content source and its published article count. Use it to build source filters, coverage views, or agent query scopes.
      tags: [Public]
      responses:
        "200":
          description: Published article sources and counts.
          content:
            application/json:
              schema:
                type: object
                required: [meta, items]
                properties:
                  meta:
                    allOf:
                      - $ref: "#/components/schemas/PublicMeta"
                      - type: object
                        properties:
                          count:
                            type: integer
                            description: Number of sources.
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/SourceSummary"
              examples:
                sourceList:
                  value:
                    meta:
                      count: 1
                      generatedAt: "2026-05-24T12:24:04+08:00"
                      generatedAtDisplay: "2026-05-24 12:24"
                    items:
                      - sourceName: GitHub Advisory
                        count: 12
      x-codeSamples:
        - lang: cURL
          label: Get source list
          source: |
            curl -sS 'http://127.0.0.1:3000/api/sources'

  /api/articles:
    get:
      operationId: listArticles
      summary: Query articles
      description: |
        Query public security articles. The endpoint always returns ready articles only; any caller-supplied status parameter is ignored to avoid exposing in-progress admin content.
        Titles and summaries are localized by the lang parameter. Use /api/articles/{articleId} to fetch the Markdown body.
      tags: [Articles]
      parameters:
        - name: lang
          in: query
          schema: { type: string, enum: [zh, en], default: zh }
          description: Response language. zh returns Chinese titles/summaries; en returns English titles/summaries.
          example: en
        - name: q
          in: query
          schema: { type: string }
          description: Keyword search across title, summary, source, and tags. Chinese and English are supported.
          example: cve
        - name: tag
          in: query
          schema: { type: string }
          description: Filter by tag. Tags are usually produced by rules or LLM processing, such as cve, npm, or supply-chain.
          example: npm
        - name: source
          in: query
          schema: { type: string }
          description: Filter by source name. Match values returned by /api/sources in sourceName.
          example: GitHub Advisory
        - name: ecosystem
          in: query
          schema:
            {
              type: string,
              enum:
                [
                  npm,
                  pypi,
                  maven,
                  go,
                  crates-io,
                  github-actions,
                  docker,
                  multi,
                ],
            }
          description: Filter by the primary package ecosystem discussed by the article.
          example: npm
        - name: riskCategory
          in: query
          schema:
            {
              type: string,
              enum:
                [
                  vulnerability,
                  exploit-activity,
                  malicious-package,
                  supply-chain-attack,
                  dependency-risk,
                ],
            }
          description: Filter by risk category.
          example: malicious-package
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Page size. Invalid values fall back to the default; values above 100 are clamped to 100.
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
          description: Page number, starting from 1.
      responses:
        "200":
          description: Article list.
          content:
            application/json:
              schema:
                type: object
                required: [meta, items]
                properties:
                  meta:
                    $ref: "#/components/schemas/ArticleListMeta"
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Article"
              examples:
                keywordSearch:
                  summary: Search CVE-related articles
                  value:
                    meta:
                      lang: en
                      status: ready
                      query: cve
                      limit: 2
                      count: 2
                      page: 1
                      pageSize: 2
                      totalCount: 8
                      totalPages: 4
                    items: []
      x-codeSamples:
        - lang: cURL
          label: Search articles
          source: |
            curl -sS 'http://127.0.0.1:3000/api/articles?q=cve&limit=2&lang=en'
        - lang: cURL
          label: Filter by tag
          source: |
            curl -sS 'http://127.0.0.1:3000/api/articles?tag=npm&limit=5'

  /api/articles/{articleId}:
    get:
      operationId: getArticleById
      summary: Get article details
      description: Fetch one full article by id, including the Markdown body, canonical URL, metadata, tags, and timestamps. Prefer getting articleId from /api/articles first.
      tags: [Articles]
      parameters:
        - name: articleId
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: UUID-format article id.
          example: 8b761e1e-ba00-4bbd-af4b-ee4c605a5531
        - name: lang
          in: query
          schema: { type: string, enum: [zh, en], default: zh }
          description: Response body language. If the requested locale is unavailable, the server falls back to available content.
      responses:
        "200":
          description: Article details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleDetail"
        "404":
          $ref: "#/components/responses/NotFound"
      x-codeSamples:
        - lang: cURL
          label: Get article details
          source: |
            curl -sS 'http://127.0.0.1:3000/api/articles/{articleId}?lang=en'

  /api/security/check/overview:
    get:
      operationId: getSecurityCheckOverview
      summary: Vulnerability statistics overview
      description: Returns affected package record counts by ecosystem from the local security mirror. Use this to understand mirror coverage, not as a unique vulnerability count.
      tags: [Security]
      responses:
        "200":
          description: Affected package counts by ecosystem.
          content:
            application/json:
              schema:
                type: object
                required: [totals]
                properties:
                  totals:
                    $ref: "#/components/schemas/SecurityEcosystemTotals"
              examples:
                ecosystemTotals:
                  value:
                    totals:
                      npm: 20337
                      pypi: 21115
                      go: 9143
                      crates-io: 3007
      x-codeSamples:
        - lang: cURL
          label: Get security overview
          source: |
            curl -sS 'http://127.0.0.1:3000/api/security/check/overview'

  /api/security/check/packages:
    post:
      operationId: checkSecurityPackages
      summary: Batch check package vulnerabilities
      description: |
        Batch check package coordinates against the local security mirror for known security risk signals. Send normalized package coordinates only; do not upload a full project, lockfile, or source code.
        Each request accepts up to 100 packages. When version is present, the API attempts range matching for that exact version; when omitted, it returns all known matches for the package.
      tags: [Security]
      requestBody:
        required: true
        description: packages must contain 1-100 package coordinates.
        content:
          application/json:
            schema:
              type: object
              required: [packages]
              properties:
                packages:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    $ref: "#/components/schemas/PackageCoordinate"
            examples:
              mixedEcosystems:
                summary: Mixed ecosystem package check
                value:
                  packages:
                    - ecosystem: npm
                      name: lodash
                      version: 4.17.20
                    - ecosystem: pypi
                      name: requests
                      version: 2.19.0
      responses:
        "200":
          description: Package check result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageCheckResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
      x-codeSamples:
        - lang: cURL
          label: Batch check packages
          source: |
            curl -sS 'http://127.0.0.1:3000/api/security/check/packages' \
              -H 'content-type: application/json' \
              -d '{"packages":[{"ecosystem":"npm","name":"lodash","version":"4.17.20"}]}'

  /api/security/advisories:
    get:
      operationId: listSecurityAdvisories
      summary: Query security advisories
      description: Search structured advisories by package, CVE, risk type, CISA KEV status, CVSS, EPSS, withdrawn state, and update time.
      tags: [Security]
      parameters:
        - name: q
          in: query
          schema: { type: string }
          description: Search GHSA, MAL, summary, details, CVE, related ids, or upstream ids.
          example: axios
        - name: ecosystem
          in: query
          schema: { type: string, enum: [npm, pypi, go, crates-io] }
          description: Package ecosystem. Use together with package to query advisories for one package.
        - name: package
          in: query
          schema: { type: string }
          description: Package name. PyPI names are normalized by case and separators; npm/crates.io are lowercased; Go module paths are preserved.
          example: axios
        - name: cve
          in: query
          schema: { type: string, pattern: '^CVE-\d{4}-\d{4,}$' }
          description: CVE id. The server normalizes it to uppercase.
          example: CVE-2026-25639
        - name: riskType
          in: query
          schema:
            { type: string, enum: [unknown, vulnerability, malicious-package] }
          description: Risk type.
        - name: kev
          in: query
          schema: { type: boolean }
          description: true returns only CISA KEV-listed advisories; false returns only non-KEV advisories.
        - name: withdrawn
          in: query
          schema: { type: boolean }
          description: Filter by withdrawn state.
        - name: cvssMin
          in: query
          schema: { type: number, minimum: 0, maximum: 10 }
          description: Return advisories whose best CVSS score is at least this value.
        - name: epssMin
          in: query
          schema: { type: number, minimum: 0, maximum: 1 }
          description: Return advisories whose EPSS percentile is at least this value.
        - name: updatedAfter
          in: query
          schema: { type: string, format: date-time }
          description: Return advisories updated, published, or withdrawn after this timestamp.
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
      responses:
        "200":
          description: Security advisory list.
          content:
            application/json:
              schema:
                type: object
                required: [meta, items]
                properties:
                  meta:
                    $ref: "#/components/schemas/SecurityAdvisoryListMeta"
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/SecurityAdvisory"
      x-codeSamples:
        - lang: cURL
          label: Query axios advisories
          source: |
            curl -sS 'http://127.0.0.1:3000/api/security/advisories?ecosystem=npm&package=axios&limit=3'
        - lang: cURL
          label: Query CISA KEV advisories
          source: |
            curl -sS 'http://127.0.0.1:3000/api/security/advisories?kev=true&limit=3'

  /api/security/advisories/{advisoryId}:
    get:
      operationId: getSecurityAdvisory
      summary: Get one security advisory
      description: Get one advisory by OSV/GHSA/MAL external id, including affected packages, ranges, fixed versions, related ids, and CVE enrichment.
      tags: [Security]
      parameters:
        - name: advisoryId
          in: path
          required: true
          schema: { type: string }
          description: OSV/GHSA/MAL external id, for example GHSA-43fc-jf86-j433.
          example: GHSA-43fc-jf86-j433
      responses:
        "200":
          description: Security advisory detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityAdvisory"
        "404":
          $ref: "#/components/responses/NotFound"
      x-codeSamples:
        - lang: cURL
          label: Get advisory detail
          source: |
            curl -sS 'http://127.0.0.1:3000/api/security/advisories/GHSA-43fc-jf86-j433'

  /api/security/packages/{ecosystem}/{packageName}:
    get:
      operationId: getSecurityPackageProfile
      summary: Get package risk profile
      description: Get a risk profile for one package, including finding count, confirmed affected count, highest risk, latest update, suggested fixed versions, and full findings.
      tags: [Security]
      parameters:
        - name: ecosystem
          in: path
          required: true
          schema: { type: string, enum: [npm, pypi, go, crates-io] }
          description: Package ecosystem.
        - name: packageName
          in: path
          required: true
          schema: { type: string }
          description: Package name or module path. Scoped npm packages and multi-segment Go module paths are supported.
          example: axios
        - name: version
          in: query
          schema: { type: string, nullable: true }
          description: Optional version. When present, the API checks whether that version is affected by each matched range.
          example: 1.0.0
      responses:
        "200":
          description: Package risk profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
      x-codeSamples:
        - lang: cURL
          label: Get npm package profile
          source: |
            curl -sS 'http://127.0.0.1:3000/api/security/packages/npm/axios?version=1.0.0'
        - lang: cURL
          label: Get Go module profile
          source: |
            curl -sS 'http://127.0.0.1:3000/api/security/packages/go/golang.org/x/net'

  /api/security/cves/{cveId}:
    get:
      operationId: getSecurityCve
      summary: Get CVE enrichment detail
      description: Get CVE enrichment details, including CVSS, CWE, EPSS, CISA KEV, NVD timestamps, and advisories related to the CVE.
      tags: [Security]
      parameters:
        - name: cveId
          in: path
          required: true
          schema: { type: string, pattern: '^CVE-\d{4}-\d{4,}$' }
          description: CVE id.
          example: CVE-2026-25639
      responses:
        "200":
          description: CVE enrichment and related advisories.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CveDetail"
        "404":
          $ref: "#/components/responses/NotFound"
      x-codeSamples:
        - lang: cURL
          label: Get CVE detail
          source: |
            curl -sS 'http://127.0.0.1:3000/api/security/cves/CVE-2026-25639'

  /api/security/sync/status:
    get:
      operationId: getSecuritySyncStatus
      summary: Security data sync status
      description: Inspect sync status, data freshness, imported record counts, and recent errors for OSV, NVD, FIRST EPSS, CISA KEV, and related security sources.
      tags: [Security]
      responses:
        "200":
          description: Sync status for OSV/NVD/EPSS/KEV and related sources.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecuritySyncStatusResponse"
      x-codeSamples:
        - lang: cURL
          label: Get sync status
          source: |
            curl -sS 'http://127.0.0.1:3000/api/security/sync/status'

components:
  responses:
    BadRequest:
      description: The request parameters or request body do not satisfy the endpoint contract.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidPackages:
              summary: Empty packages array
              value:
                ok: false
                message: packages must include at least one package.
    NotFound:
      description: The requested resource does not exist, or the article is not publicly published.
      content:
        application/json:
          schema:
            type: object
            required: [error]
            properties:
              error:
                type: string
                description: Human-readable error message for callers.
          examples:
            missingArticle:
              value:
                error: Article not found.
    TooManyRequests:
      description: Too many requests. The package-check endpoint has a basic local rate limit; callers should batch and retry.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            rateLimited:
              value:
                ok: false
                message: Too many requests. Please try again later.

  schemas:
    ErrorResponse:
      type: object
      description: Standard error response. Public endpoints do not expose stack traces or internal database errors.
      required: [ok, message]
      properties:
        ok:
          type: boolean
          example: false
        message:
          type: string
          example: packages must include at least one package.

    PublicMeta:
      type: object
      description: Generation metadata for public endpoints. Display fields use the Asia/Shanghai time format.
      properties:
        generatedAt:
          type: string
          format: date-time
          example: "2026-05-24T12:24:04+08:00"
        generatedAtDisplay:
          type: string
          example: "2026-05-24 12:24"

    PublicOverview:
      type: object
      description: Basic counts for the public browsing surface.
      properties:
        articleCount:
          type: integer
          description: Number of publicly readable articles. Only ready articles are counted.
          example: 101
        sourceCount:
          type: integer
          description: Number of public content sources.
          example: 1

    SourceSummary:
      type: object
      description: One public source and its published article count.
      properties:
        sourceName:
          type: string
          example: GitHub Advisory
        count:
          type: integer
          example: 12

    ArticleListMeta:
      type: object
      description: Pagination and filter echo for article list responses. status is fixed to ready for the public API.
      properties:
        lang:
          type: string
          enum: [zh, en]
          description: Language used for returned content.
        status:
          type: string
          description: The public API only returns ready articles.
          example: ready
        source:
          type: string
          nullable: true
          description: Source filter echo; null when omitted.
        query:
          type: string
          nullable: true
          description: Keyword filter echo; null when omitted.
        ecosystem:
          type: string
          nullable: true
          description: Ecosystem filter echo.
        riskCategory:
          type: string
          nullable: true
          description: Risk category filter echo.
        tag:
          type: string
          nullable: true
          description: Tag filter echo.
        limit:
          type: integer
          description: Requested page size, capped at 100.
          example: 20
        count:
          type: integer
          description: Number of items returned in this page.
        page:
          type: integer
          description: Current page number, starting from 1.
        pageSize:
          type: integer
          description: Same value as limit for client compatibility.
        totalCount:
          type: integer
          description: Total number of records matching the current filters.
        totalPages:
          type: integer
          description: Total page count for the current filters.

    Article:
      type: object
      description: Public article list item. The Markdown body is returned only by the detail endpoint.
      properties:
        id:
          type: string
          format: uuid
          description: Article id. Use it with /api/articles/{articleId} for details.
        title:
          type: string
          description: Localized title selected by lang.
        summary:
          type: string
          description: Localized summary selected by lang. It may contain Markdown.
        url:
          type: string
          format: uri
          nullable: true
          description: Original source URL.
        sourceName:
          type: string
          description: RSS or content source name.
        ecosystem:
          type: string
          description: Primary ecosystem discussed by the article.
        riskCategory:
          type: string
          description: Risk category for the article.
        tags:
          type: array
          description: Rule or LLM-generated tags that can be reused as tag filters.
          items:
            type: string
        status:
          type: string
          example: ready
        publishedAt:
          type: string
          format: date-time
          description: Published time with Asia/Shanghai offset.
        publishedAtDisplay:
          type: string
          description: Beijing-time display string.
        updatedAt:
          type: string
          format: date-time
        updatedAtDisplay:
          type: string
        locale:
          type: string
          enum: [zh, en]
          description: Actual content locale returned by the API.

    ArticleDetail:
      allOf:
        - $ref: "#/components/schemas/Article"
        - type: object
          description: Article detail adds the Markdown body and canonical URL to the list item fields.
          properties:
            content:
              type: string
              description: Markdown body.
            canonicalUrl:
              type: string
              format: uri
              nullable: true
              description: Canonical URL from the source site.

    SecurityEcosystemTotals:
      type: object
      description: Affected package record counts by ecosystem in the local security mirror. This is not a unique vulnerability count.
      properties:
        npm:
          type: integer
          example: 20337
        pypi:
          type: integer
          example: 21115
        go:
          type: integer
          example: 9143
        crates-io:
          type: integer
          example: 3007

    PackageCoordinate:
      type: object
      description: Package-check requests accept normalized package coordinates only; do not send repositories, lockfiles, or source code.
      required: [ecosystem, name]
      properties:
        ecosystem:
          type: string
          enum: [npm, pypi, go, crates-io]
          description: Package ecosystem. The public check currently supports npm, PyPI, Go, and crates.io.
          example: npm
        name:
          type: string
          description: Package name or module path. Use full module paths for Go and include @scope/name for scoped npm packages.
          example: axios
        version:
          type: string
          nullable: true
          description: Optional package version. When provided, the API tries to decide whether that exact version is affected; when omitted, it returns all known records for the package.
          example: 1.0.0

    PackageCheckMeta:
      type: object
      description: Data-source status for this package-check response.
      properties:
        source:
          type: string
          enum: [local-osv-mirror]
          description: The query used the local OSV mirror.
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
          description: Last successful sync time.
        stale:
          type: boolean
          description: Whether the local mirror is older than the freshness threshold.

    PackageCheckResponse:
      type: object
      description: Batch package-check result. findings is a flat list where each record links one package coordinate to one advisory match.
      properties:
        meta:
          $ref: "#/components/schemas/PackageCheckMeta"
        findings:
          type: array
          items:
            $ref: "#/components/schemas/SecurityFinding"

    PackageProfile:
      type: object
      description: Risk profile for one package, suitable for package detail pages or agent tools.
      properties:
        package:
          $ref: "#/components/schemas/PackageCoordinate"
        meta:
          $ref: "#/components/schemas/PackageCheckMeta"
        summary:
          type: object
          description: Package-level summary derived from findings.
          properties:
            totalFindings:
              type: integer
              description: Total finding records.
            affectedCount:
              type: integer
              description: Findings where version matching confirmed affected=true.
            inconclusiveCount:
              type: integer
              description: Package-name matches where version matching could not confirm the exact affected state.
            highestRisk:
              type: object
              nullable: true
              description: Highest risk level found for this package.
              properties:
                level:
                  type: string
                  enum: [critical, high, medium, low, unknown]
                score:
                  type: number
            latestUpdatedAt:
              type: string
              format: date-time
              nullable: true
              description: Most recent update time across related records.
            recommendedFixedVersions:
              type: array
              description: Candidate fixed versions gathered from advisory impact ranges.
              items:
                type: string
        findings:
          type: array
          items:
            $ref: "#/components/schemas/SecurityFinding"

    SecurityFinding:
      type: object
      description: Match result between one package coordinate and one security advisory.
      properties:
        affected:
          type: boolean
          description: Whether the requested version is confirmed to be in an affected range. It may be false when no version was provided or matching is inconclusive.
        confidence:
          type: string
          enum: [high, medium, low, undetermined]
          description: Version-match confidence.
        matchReason:
          type: string
          description: Explains how affected and confidence were derived.
          enum:
            - explicit_affected_version
            - version_in_ecosystem_range
            - version_outside_ecosystem_range
            - range_present_but_inconclusive
            - package_match_without_version
        matchSummary:
          type: string
          description: Human-readable match summary.
        package:
          $ref: "#/components/schemas/PackageCoordinate"
        advisory:
          $ref: "#/components/schemas/SecurityAdvisoryBase"
        affectedPackage:
          $ref: "#/components/schemas/PackageImpact"
        cveEnrichments:
          type: array
          description: CVE enrichment records related to this advisory, potentially sourced from NVD, FIRST EPSS, and CISA KEV.
          items:
            $ref: "#/components/schemas/CveEnrichment"
        risk:
          type: object
          nullable: true
          description: Risk score computed from static severity, EPSS, KEV, and match confidence.
          properties:
            level:
              type: string
              enum: [critical, high, medium, low, unknown]
            score:
              type: number
            signals:
              type: array
              items:
                type: string

    SecurityAdvisoryListMeta:
      type: object
      description: Pagination and filter echo for advisory list responses.
      properties:
        q: { type: string, description: Keyword filter echo. }
        ecosystem:
          { type: string, nullable: true, description: Ecosystem filter echo. }
        packageName: { type: string, description: Package-name filter echo. }
        cve: { type: string, nullable: true, description: CVE filter echo. }
        riskType:
          { type: string, nullable: true, description: Risk-type filter echo. }
        kev:
          { type: boolean, nullable: true, description: CISA KEV filter echo. }
        withdrawn:
          {
            type: boolean,
            nullable: true,
            description: Withdrawn-state filter echo.,
          }
        cvssMin:
          {
            type: number,
            nullable: true,
            description: Minimum CVSS filter echo.,
          }
        epssMin:
          {
            type: number,
            nullable: true,
            description: Minimum EPSS percentile filter echo.,
          }
        updatedAfter:
          {
            type: string,
            format: date-time,
            nullable: true,
            description: Updated-after filter echo.,
          }
        limit: { type: integer }
        page: { type: integer }
        count: { type: integer }
        totalCount: { type: integer }
        totalPages: { type: integer }

    SecurityAdvisoryBase:
      type: object
      description: Base structure for OSV/GHSA/MAL advisories.
      properties:
        id:
          type: string
          description: External advisory id, such as a GHSA or MAL id.
        source:
          type: string
          description: Data source.
        sourceUrl:
          type: string
          format: uri
          nullable: true
          description: Upstream advisory URL.
        riskType:
          type: string
          enum: [unknown, vulnerability, malicious-package]
        summary:
          type: string
          description: Advisory summary.
        details:
          type: string
          nullable: true
          description: Upstream advisory details.
        aliases:
          type: array
          description: Aliases, commonly including CVE ids.
          items:
            type: string
        related:
          type: array
          description: OSV related ids.
          items:
            type: string
        upstream:
          type: array
          description: Upstream related ids.
          items:
            type: string
        severity:
          type: array
          description: Raw OSV severity objects.
          items:
            type: object
        references:
          type: array
          description: Fix, report, web, and other reference links.
          items:
            type: object
        maliciousOrigins:
          type: array
          description: Malicious-package origin records; usually empty for vulnerability advisories.
          items:
            type: object
        publishedAt:
          type: string
          format: date-time
          nullable: true
        modifiedAt:
          type: string
          format: date-time
          nullable: true
        withdrawnAt:
          type: string
          format: date-time
          nullable: true
          description: Advisory withdrawal time; null when not withdrawn.

    SecurityAdvisory:
      allOf:
        - $ref: "#/components/schemas/SecurityAdvisoryBase"
        - type: object
          properties:
            packageImpacts:
              type: array
              description: Affected packages, ranges, and fixed versions.
              items:
                $ref: "#/components/schemas/PackageImpact"
            cveEnrichments:
              type: array
              description: CVE enrichment data.
              items:
                $ref: "#/components/schemas/CveEnrichment"

    PackageImpact:
      type: object
      description: Impact range for one package in one advisory.
      properties:
        ecosystem:
          type: string
          enum: [npm, pypi, go, crates-io]
        packageName:
          type: string
          description: Package name from the upstream advisory.
        packageKey:
          type: string
          description: VibeGuard-normalized package key.
        purl:
          type: string
          nullable: true
          description: Package URL, useful for cross-tool correlation when present.
        affectedVersions:
          type: array
          description: Explicitly listed affected versions from the upstream advisory.
          items:
            type: string
        ranges:
          type: array
          description: Raw OSV ranges with introduced/fixed/last_affected events.
          items:
            type: object
        fixedVersions:
          type: array
          description: Known fixed versions.
          items:
            type: string

    CveDetail:
      type: object
      description: Enrichment and related advisories for one CVE.
      properties:
        cveId:
          type: string
          example: CVE-2026-25639
        enrichment:
          oneOf:
            - $ref: "#/components/schemas/CveEnrichment"
            - type: "null"
        advisories:
          type: array
          items:
            $ref: "#/components/schemas/SecurityAdvisory"

    CveEnrichment:
      type: object
      description: CVE enrichment fields from NVD, FIRST EPSS, and CISA KEV.
      properties:
        cveId: { type: string }
        title:
          { type: string, nullable: true, description: NVD or source title. }
        description:
          { type: string, nullable: true, description: CVE description. }
        cvssMetrics:
          {
            type: array,
            description: Raw CVSS metric objects.,
            items: { type: object },
          }
        bestCvssScore:
          {
            type: string,
            nullable: true,
            description: Selected highest CVSS score.,
          }
        bestCvssSeverity:
          { type: string, nullable: true, description: Highest CVSS severity. }
        cweIds:
          { type: array, description: CWE categories., items: { type: string } }
        epss: { type: string, nullable: true, description: FIRST EPSS score. }
        epssPercentile:
          { type: string, nullable: true, description: FIRST EPSS percentile. }
        epssScoreDate: { type: string, format: date-time, nullable: true }
        epssModelVersion: { type: string, nullable: true }
        kevListed:
          { type: boolean, description: Whether the CVE is listed in CISA KEV. }
        kevDateAdded: { type: string, format: date-time, nullable: true }
        kevDueDate: { type: string, format: date-time, nullable: true }
        kevKnownRansomwareCampaignUse: { type: string, nullable: true }
        kevRequiredAction: { type: string, nullable: true }
        kevVendorProject: { type: string, nullable: true }
        kevProduct: { type: string, nullable: true }
        kevNotes: { type: string, nullable: true }
        nvdPublishedAt: { type: string, format: date-time, nullable: true }
        nvdModifiedAt: { type: string, format: date-time, nullable: true }

    SecuritySyncStatusResponse:
      type: object
      description: Security source sync status, used to decide whether the local mirror is fresh.
      properties:
        meta:
          type: object
          properties:
            sourceCount:
              type: integer
              description: Number of sync-state records.
            staleAfterMs:
              type: integer
              description: Millisecond threshold used to mark a source as stale.
        items:
          type: array
          items:
            type: object
            properties:
              source:
                {
                  type: string,
                  description: Data source,
                  such as osv,
                  nvd,
                  epss,
                  or kev.,
                }
              scope: { type: string, description: Sync scope. }
              status: { type: string, enum: [idle, running, success, failed] }
              lastProcessedModifiedAt:
                { type: string, format: date-time, nullable: true }
              cursorJson:
                { type: object, description: Incremental sync cursor. }
              lastStartedAt: { type: string, format: date-time, nullable: true }
              lastSuccessAt: { type: string, format: date-time, nullable: true }
              lastError: { type: string, nullable: true }
              recordsSeen: { type: integer }
              recordsImported: { type: integer }
              recordsFailed: { type: integer }
              updatedAt: { type: string, format: date-time }
              stale:
                {
                  type: boolean,
                  description: Whether this source is older than the freshness threshold.,
                }
