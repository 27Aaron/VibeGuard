openapi: 3.1.0
info:
  title: VibeGuard Public API
  version: 1.0.0
  description: VibeGuard 为开发者和安全团队提供供应链威胁情报的公开 API，支持漏洞包检查与安全文章检索，无需认证即可访问。
  contact:
    name: VibeGuard
    url: https://github.com/27Aaron/VibeGuard

servers:
  - url: /
    description: Current server

paths:
  /api/articles:
    get:
      summary: 查询文章列表
      tags: [Articles]
      parameters:
        - name: lang
          in: query
          schema: { type: string, enum: [zh, en], default: zh }
          description: 返回内容语言。
        - name: q
          in: query
          schema: { type: string }
          description: 全文搜索关键词。
        - name: tag
          in: query
          schema: { type: string }
          description: 按标签筛选。
        - name: source
          in: query
          schema: { type: string }
          description: 按来源筛选。
        - name: ecosystem
          in: query
          schema: { type: string, enum: [npm, pypi, maven, go, crates-io, github-actions, docker, multi] }
        - name: riskCategory
          in: query
          schema: { type: string, enum: [vulnerability, exploit-activity, malicious-package, supply-chain-attack, dependency-risk] }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
      responses:
        "200":
          description: 文章列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    properties:
                      lang: { type: string }
                      limit: { type: integer }
                      count: { type: integer }
                      page: { type: integer }
                      totalCount: { type: integer }
                      totalPages: { type: integer }
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Article"

  /api/articles/{articleId}:
    get:
      summary: 获取文章详情
      tags: [Articles]
      parameters:
        - name: articleId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: lang
          in: query
          schema: { type: string, enum: [zh, en], default: zh }
      responses:
        "200":
          description: 文章详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleDetail"
        "404":
          description: 未找到
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }

  /api/security/check/overview:
    get:
      summary: 漏洞统计概览
      tags: [Security]
      responses:
        "200":
          description: 各生态系统受影响包数量
          content:
            application/json:
              schema:
                type: object
                properties:
                  totals:
                    type: object
                    properties:
                      npm: { type: integer }
                      pypi: { type: integer }
                      go: { type: integer }
                      crates-io: { type: integer }

  /api/security/check/packages:
    post:
      summary: 批量检查包漏洞
      tags: [Security]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                packages:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: object
                    properties:
                      ecosystem: { type: string, enum: [npm, pypi, go, crates-io] }
                      name: { type: string }
                      version: { type: string, nullable: true }
                    required: [ecosystem, name]
              required: [packages]
      responses:
        "200":
          description: 检查结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  findings:
                    type: array
                    items:
                      type: object
                      properties:
                        affected: { type: boolean }
                        matchSummary: { type: string }
                        package:
                          type: object
                          properties:
                            ecosystem: { type: string }
                            name: { type: string }
                            version: { type: string, nullable: true }
                        advisory:
                          type: object
                          properties:
                            id: { type: string }
                            riskType: { type: string, enum: [vulnerability, malicious-package] }
                            summary: { type: string }
                            aliases: { type: array, items: { type: string } }
                            severity: { type: array, items: { type: object } }
                            references: { type: array, items: { type: object } }
                        affectedPackage:
                          type: object
                          properties:
                            affectedVersions: { type: array, items: { type: string } }
                            fixedVersions: { type: array, items: { type: string } }
                        risk:
                          type: object
                          properties:
                            level: { type: string, enum: [critical, high, medium, low, unknown] }
                            score: { type: number }
                            signals: { type: array, items: { type: string } }
                        cveEnrichments:
                          type: array
                          items:
                            type: object
                            properties:
                              cveId: { type: string }
                              title: { type: string, nullable: true }
                              description: { type: string, nullable: true }
                              bestCvssScore: { type: string, nullable: true }
                              bestCvssSeverity: { type: string, nullable: true }
                              epss: { type: string, nullable: true }
                              epssPercentile: { type: string, nullable: true }
                              kevListed: { type: boolean }
                              kevKnownRansomwareCampaignUse: { type: string, nullable: true }
                              cweIds: { type: array, items: { type: string } }
        "400":
          description: 参数错误
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  message: { type: string }

components:
  schemas:
    Article:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        summary: { type: string }
        url: { type: string, format: uri }
        sourceName: { type: string }
        ecosystem: { type: string }
        riskCategory: { type: string }
        tags: { type: array, items: { type: string } }
        publishedAt: { type: string, format: date-time }
        publishedAtDisplay: { type: string }
        updatedAt: { type: string, format: date-time }
        updatedAtDisplay: { type: string }
        locale: { type: string, enum: [zh, en] }

    ArticleDetail:
      allOf:
        - $ref: "#/components/schemas/Article"
        - type: object
          properties:
            content: { type: string, description: Markdown 正文 }
            canonicalUrl: { type: string, nullable: true }
