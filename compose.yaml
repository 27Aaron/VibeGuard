services:
  postgres:
    image: postgres:18
    container_name: content-foundation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: content_foundation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - content_foundation_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d content_foundation"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  content_foundation_postgres_data:
