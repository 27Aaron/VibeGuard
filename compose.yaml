services:
  postgres:
    image: postgres:18
    container_name: vibeguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vibeguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - vibeguard_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vibeguard"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  vibeguard_postgres_data:
